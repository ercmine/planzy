server {
    listen 80;
    server_name api.perbug.com;

    # Replace with the actual backend app port.
    set $perbug_upstream http://127.0.0.1:8080;

    location = /health {
        proxy_pass $perbug_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass $perbug_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # If backend is mounted under /api, use this block instead of location / above:
    # location / {
    #     proxy_pass $perbug_upstream/api;
    # }
}
